<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Tax Home Kenya Limited</title>
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    .error-page {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: #f9f7f4;
    }
    .error-content h1 {
      font-size: 5rem;
      color: #d4a574;
      margin-bottom: 0.5rem;
    }
    .error-content h2 {
      font-size: 1.8rem;
      color: #1a472a;
      margin-bottom: 1rem;
    }
    .error-content p {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 2rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-btn {
      display: inline-block;
      background: #1a472a;
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin: 0.5rem;
      transition: all 0.3s ease;
    }
    .error-btn:hover {
      background: #d4a574;
      color: #1a472a;
    }
    .error-btn.secondary {
      background: #d4a574;
      color: #1a472a;
    }
    .error-btn.secondary:hover {
      background: #1a472a;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="logo-section">
        <img src="assets/logo.png" alt="Tax Home Kenya Limited Logo" class="logo-img">
        <div class="logo-text">
          <h1>Tax Home Kenya Limited</h1>
          <p>SIMPLIFYING YOUR TAX JOURNEY</p>
        </div>
      </a>
    </div>
  </header>

  <div class="error-page">
    <div class="error-content">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>Sorry, the page you're looking for doesn't exist or has been moved. Let us help you find what you need.</p>
      <a href="index.html" class="error-btn">Go Home</a>
      <a href="pages/blog.html" class="error-btn secondary">Visit Blog</a>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <p>&copy; 2026 Tax Home Kenya Limited. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
